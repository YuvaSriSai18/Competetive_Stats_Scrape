name: Scrape Coding Stats (24h Schedule)

on:
  schedule:
    # Runs every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  scrape-stats:
    runs-on: ubuntu-latest
    name: Trigger Coding Stats Scraping

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log workflow start
        run: |
          echo "Starting coding stats scraping job"
          echo "Triggered at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Call scraping endpoint
        run: |
          curl -X GET \
            -H "X-Secret-Key: ${{ secrets.SCRAPING_SECRET_KEY }}" \
            --max-time 900 \
            --retry 3 \
            --retry-delay 10 \
            --retry-max-time 60 \
            --fail-with-body \
            "${{ secrets.SCRAPING_ENDPOINT_URL }}/scrape-coding-stats"
        env:
          SCRAPING_ENDPOINT_URL: ${{ secrets.SCRAPING_ENDPOINT_URL }}
          SCRAPING_SECRET_KEY: ${{ secrets.SCRAPING_SECRET_KEY }}

      - name: Log success
        if: success()
        run: |
          echo "✓ Scraping job completed successfully"
          echo "Completed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Log failure
        if: failure()
        run: |
          echo "✗ Scraping job failed"
          echo "Failed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          exit 1
